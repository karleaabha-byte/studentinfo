<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            background-color: #f4f6f9;
        }

        .left {
            width: 30%;
            background: white;
            padding: 20px;
            height: 100vh;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .right {
            width: 70%;
            padding: 40px;
        }

        a {
            text-decoration: none;
            color: #333;
        }

        li {
            margin-bottom: 10px;
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="left">
    <h2>Students</h2>

    <a class="add-btn" href="/add">+ Add Student</a>

    <ul>
        {% for student in students %}
            <li>
                <a href="/student/{{ student[0] }}">
                    {{ student[1] }}
                </a>
            </li>
        {% endfor %}
    </ul>
</div>

<div class="right">
    <h2>Welcome</h2>
    <p>Select a student from the left to view details.</p>
</div>

</body>
</html>
