<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .form-box, .list-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 45%;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            width: 100%;
        }

        table {
            width: 100%;
            margin-top: 10px;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            background: #eee;
        }
    </style>
</head>
<body>

<h1>Student Information Portal</h1>

<div class="container">

    <div class="form-box">
        <h2>Add Student</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="sapid" placeholder="SAP ID" required>

            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <input type="number" step="0.01" name="marks" placeholder="Marks" required>

            <button type="submit">Add Student</button>
        </form>
    </div>

    <div class="list-box">
        <h2>Student List</h2>
        <table border="1">
            <tr>
                <th>Name</th>
                <th>SAP ID</th>
                <th>Gender</th>
                <th>Marks</th>
            </tr>

            {% for student in students %}
            <tr>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>{{ student[4] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

</body>
</html>
